name: Build Android APK

on:
  workflow_dispatch:
  push:
    branches: [master]
    paths:
      - 'apps/mobile/**'
      - 'pnpm-lock.yaml'
      - '.github/workflows/build-android.yml'

jobs:
  build:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Set up Java 17
        uses: actions/setup-java@v4
        with:
          java-version: '17'
          distribution: 'temurin'

      - name: Set up Node 20
        uses: actions/setup-node@v4
        with:
          node-version: '20'

      - name: Install pnpm
        run: npm install -g pnpm@9

      - name: Install dependencies
        run: pnpm install

      - name: Build mobile web bundle
        working-directory: apps/mobile
        run: pnpm build
        env:
          VITE_API_URL: https://arrow-security-api.onrender.com/api
          VITE_TENANT_SLUG: acme

      - name: Publish JS bundle to live-update server
        working-directory: apps/mobile
        run: |
          VERSION=$(echo "$GITHUB_SHA" | cut -c1-8)
          cd dist && zip -r ../bundle.zip . && cd ..
          curl -s -o /dev/null -w "%{http_code}" \
            -X POST \
            -H "X-Update-Token: ${{ secrets.APP_UPDATE_TOKEN }}" \
            -F "bundle=@bundle.zip" \
            "https://arrow-security-api.onrender.com/api/app-update/publish?version=${VERSION}" \
            | tee /tmp/publish_status
          STATUS=$(cat /tmp/publish_status)
          echo "Publish status: $STATUS"
          [ "$STATUS" = "201" ] || echo "Warning: bundle publish returned $STATUS (non-fatal)"

      - name: Add Android platform
        working-directory: apps/mobile
        run: pnpm exec cap add android

      - name: Sync Capacitor
        working-directory: apps/mobile
        run: pnpm exec cap sync android

      - name: Patch Android SDK versions for @capgo/capacitor-updater
        working-directory: apps/mobile/android
        run: |
          sed -i 's/minSdkVersion = 22/minSdkVersion = 23/' variables.gradle
          sed -i 's/compileSdkVersion = 34/compileSdkVersion = 35/' variables.gradle
          sed -i 's/targetSdkVersion = 34/targetSdkVersion = 35/' variables.gradle

      - name: Write local.properties
        working-directory: apps/mobile/android
        run: echo "sdk.dir=$ANDROID_HOME" > local.properties

      - name: Make Gradle wrapper executable
        working-directory: apps/mobile/android
        run: chmod +x gradlew

      - name: Build debug APK
        working-directory: apps/mobile/android
        run: ./gradlew assembleDebug --no-daemon

      - name: Upload APK
        uses: actions/upload-artifact@v4
        with:
          name: arrow-security-guard-debug
          path: apps/mobile/android/app/build/outputs/apk/debug/app-debug.apk
          retention-days: 14
