name: Build Android APK

on:
  workflow_dispatch:          # manual trigger from GitHub Actions tab
  push:
    branches: [master]
    paths:
      - 'apps/mobile/**'
      - '.github/workflows/build-android.yml'

jobs:
  build:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Set up Java 17
        uses: actions/setup-java@v4
        with:
          java-version: '17'
          distribution: 'temurin'

      - name: Set up Node 20
        uses: actions/setup-node@v4
        with:
          node-version: '20'

      - name: Install pnpm
        run: npm install -g pnpm@9

      - name: Install dependencies
        run: pnpm install

      - name: Build mobile web bundle
        working-directory: apps/mobile
        run: pnpm build
        env:
          VITE_API_URL: https://arrow-security-api.onrender.com/api
          VITE_TENANT_SLUG: acme

      - name: Add Android platform
        working-directory: apps/mobile
        run: pnpm exec cap add android

      - name: Sync Capacitor
        working-directory: apps/mobile
        run: pnpm exec cap sync android

      - name: Write local.properties
        working-directory: apps/mobile/android
        run: echo "sdk.dir=$ANDROID_HOME" > local.properties

      - name: Make Gradle wrapper executable
        working-directory: apps/mobile/android
        run: chmod +x gradlew

      - name: Build debug APK
        working-directory: apps/mobile/android
        run: ./gradlew assembleDebug --no-daemon

      - name: Upload APK
        uses: actions/upload-artifact@v4
        with:
          name: arrow-security-guard-debug
          path: apps/mobile/android/app/build/outputs/apk/debug/app-debug.apk
          retention-days: 14
